[workspace]
authors = ["Giordon Stark <kratsg@gmail.com>"]
channels = ["conda-forge"]
name = "giordonstark.com"
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
install = { cmd = "npm install", description = "Install npm dependencies", inputs = ["package.json", "package-lock.json"], outputs = ["node_modules/.package-lock.json"] }
dev = { cmd = "npm run dev", depends-on = ["install"], description = "Start development server at http://localhost:4321" }
build = { cmd = "npm run build", depends-on = ["install"], description = "Build static site to dist/", inputs = ["src/**", "public/**", "astro.config.mjs", "tailwind.config.mjs", "tsconfig.json"], outputs = ["dist/"] }
preview = { cmd = "npm run preview", depends-on = ["build"], description = "Serve production build locally for inspection" }
format = { cmd = "npx prettier --write .", depends-on = ["install"], description = "Auto-format all files (Astro + Tailwind plugins)" }
format-check = { cmd = "npx prettier --check .", depends-on = ["install"], description = "Check formatting without writing changes (CI-safe)" }
lint = { cmd = "npx eslint .", depends-on = ["install"], description = "Lint Astro components with eslint-plugin-astro" }
linkcheck = { cmd = "lychee --root-dir='dist/' dist/", description = "Check for broken links", depends-on = ["build"] }
check = { depends-on = ["format-check", "lint", "linkcheck"] }

[dependencies]
nodejs = ">=22,<23"
lychee = ">=0.23.0,<0.24"
