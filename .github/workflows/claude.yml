name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Triggered by an @claude mention in a comment, issue body/title, or PR review.
  claude-mention:
    if: |
      github.actor == github.repository_owner && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.0
          cache: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read

  # Triggered when an issue is opened with the 'claude' label (set by issue templates).
  # Uses an explicit prompt so Claude routes based on the other labels rather than
  # looking for an @claude mention in the body (which template markdown fields don't emit).
  claude-label:
    if: |
      github.actor == github.repository_owner &&
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.0
          cache: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            This issue was filed via a GitHub issue template. Use the issue labels to determine what action to take.

            Routing by label (consult CLAUDE.md for full ordering and schema details):
            - 'mentee'           → parse form fields, add entry to src/data/mentees.yaml (undergraduate or graduate per the Level field). Newest first.
            - 'talk'             → parse form fields, add entry to src/data/talks.yaml → talks. Newest first.
            - 'community-paper'  → parse form fields, add entry to src/data/service.yaml → community_papers. Sorted at render by date.
            - 'award'            → parse form fields, add entry to src/data/awards.yaml → awards. Newest first.
            - 'service'          → parse form fields, add entry to src/data/service.yaml → roles. Append.
            - 'outreach'         → parse form fields, add entry to src/data/service.yaml → outreach. Append.
            - No routing label   → execute the instruction in the '### Instruction' field as a free-form command. Consult AGENTS.md for file locations, schemas, date formats, and ordering conventions.

            Issue form fields appear in the body as:
            ### Field Label

            Value

            After making changes: run `pixi run format .`, then `pixi run check` to validate.
            Create a branch and PR with a title like "feat: add mentee Jane Smith".
            Include `Closes #<issue-number>` in the PR description.
