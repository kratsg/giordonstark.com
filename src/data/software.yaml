categories:
  - name: Statistical Tools & Open Science
    projects:
      - title: pyhf
        role: Core Developer
        images: []
        description: >
          Pure-Python implementation of the HistFactory statistical model for
          multi-bin histogram-based analysis. Supports fitting, limit-setting,
          and interval estimation with JAX backend for automatic differentiation
          and GPU acceleration. Enabled ATLAS to become the first LHC experiment
          to publish full statistical likelihoods. NumFOCUS affiliated project.
          Development also supported through IRIS-HEP Analysis Systems.
        links:
          - label: GitHub
            url: https://github.com/scikit-hep/pyhf
            icon: github
          - label: Docs
            url: https://pyhf.readthedocs.io/en/latest/
            icon: book
          - label: Zenodo
            url: https://doi.org/10.5281/zenodo.1169739
            icon: file-text
          - label: JOSS
            url: https://doi.org/10.21105/joss.02823
            icon: file-text
          - label: CHEP 2020
            url: https://doi.org/10.1051/epjconf/202024506017
            icon: file-text
          - label: ICHEP 2022
            url: https://doi.org/10.22323/1.414.0245
            icon: file-text
          - label: PyHEP 2021 (funcX)
            url: https://doi.org/10.1051/epjconf/202125102070
            icon: file-text
        tags: [python, statistics, scikit-hep, iris-hep]

      - title: pyhs3
        role: Developer
        images: []
        description: >
          Python implementation of HS3 (HEP Statistics Serialization Standard),
          a serialization format for statistical models in high energy physics.
          Part of the DEMOS (Democratizing Models) effort, an initiative to
          broaden access to and reuse of statistical models from LHC experiments.
        links:
          - label: GitHub
            url: https://github.com/scipp-atlas/pyhs3/
            icon: github
          - label: Docs
            url: https://pyhs3.readthedocs.io/en/latest/
            icon: book
          - label: DEMOS
            url: https://democratizing-models.github.io/
            icon: globe
        tags: [python, statistics, serialization]

      - title: SimpleAnalysis
        role: Contact Editor
        images: []
        description: >
          Generator-level (truth-level) analysis framework for ATLAS, providing
          an easy-to-use interface for running reinterpretations of ATLAS SUSY
          searches without requiring the full detector simulation. Served as
          contact editor for the public documentation (ATL-PHYS-PUB-2022-017).
        links:
          - label: ATL-PHYS-PUB-2022-017
            url: https://atlas.web.cern.ch/Atlas/GROUPS/PHYSICS/PUBNOTES/ATL-PHYS-PUB-2022-017/
            icon: file-text
          - label: GitLab
            url: https://gitlab.cern.ch/atlas-sa/
            icon: gitlab
        tags: [c++, reinterpretation, atlas]

      - title: mapyde
        role: Developer
        images: []
        description: >
          MadGraph-Pythia-Delphes reinterpretation pipeline that chains HEP
          simulation tools to constrain previously untested models of new
          physics using existing ATLAS search results. Configurable via TOML
          files with support for multiple containerization backends.
          MaPyDe allows one to run all of the various HEP toolings or chain
          them together and perform a quick analysis with the results, such as
          running CERN ATLAS SimpleAnalysis or pyhf.
        links:
          - label: GitHub
            url: https://github.com/scipp-atlas/mapyde
            icon: github
          - label: Docs
            url: https://scipp-atlas.github.io/mapyde/latest/
            icon: book
          - label: SciPost Paper
            url: https://scipost.org/10.21468/SciPostPhysCodeb.27
            icon: file-text
          - label: arXiv
            url: https://arxiv.org/abs/2306.11055
            icon: file-text
        tags: [python, reinterpretation, simulation]

