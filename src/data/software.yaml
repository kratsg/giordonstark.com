  - name: Analysis Frameworks
    projects:
      - title: xAODAnaHelpers
        role: Core Developer
        images: []
        description: >
          Analysis framework built on top of the ATLAS xAOD data model,
          providing configurable algorithms for event selection, object
          calibration, and systematic uncertainties. Used by multiple ATLAS
          physics groups (SM, SUSY, Exotics, Higgs, Trigger, Jet Calibration).
        links:
          - label: GitHub
            url: https://github.com/UCATLAS/xAODAnaHelpers/
            icon: github
          - label: Docs
            url: https://xaodanahelpers.readthedocs.io
            icon: book
          - label: Zenodo
            url: https://doi.org/10.5281/zenodo.3743307
            icon: file-text
        tags: [c++, python, atlas]

      - title: root_numpy
        role: Developer (2014-2021, archived)
        images: []
        description: >
          Python extension module for converting ROOT TTrees to NumPy arrays
          and vice versa. Widely used in the HEP community for bridging
          ROOT-based C++ analyses with the Python scientific ecosystem.
          Archived in 2021 with the community transition to uproot-based
          workflows.
        links:
          - label: GitHub
            url: https://github.com/scikit-hep/root_numpy/
            icon: github
          - label: Docs
            url: https://scikit-hep.org/root_numpy/
            icon: book
          - label: JOSS
            url: https://doi.org/10.21105/joss.00307
            icon: file-text
        tags: [python, root, scikit-hep]

      - title: root-optimize
        role: Developer (archived)
        images: []
        description: >
          Tool for scanning the phase-space of a physics analysis to identify
          performant variables for discriminating signal over background.
        links:
          - label: GitHub
            url: https://github.com/kratsg/optimization
            icon: github
        tags: [python, optimization, analysis]

      - title: ATLASstylempl
        role: Developer (archived, migrated to mplhep)
        images: []
        description: >
          Matplotlib stylesheets conforming to the ATLAS experiment's official
          plotting style guidelines, enabling publication-quality figures without
          manual style configuration. Archived and contributed upstream into the
          scikit-hep/mplhep project.
        links:
          - label: GitHub
            url: https://github.com/kratsg/ATLASstylempl/
