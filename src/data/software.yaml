  - name: Early Projects
    projects:
      - title: CurveFit
        role: Developer (2011)
        images: []
        description: >
          Mathematica program for curve fitting and error propagation in the
          Caltech sophomore physics lab. Leveraged Mathematica 8's statistical
          modeling features to import variable-column data files, automate error
          propagation, and provide standardized output for fitting resonance
          peaks, damped oscillations, and similar lab measurements.
        tags: [mathematica, education, scientific-computing]

      - title: canvasGame
        role: Developer (2006)
        images: []
        description: >
          A tile-based 2D exploration game built to learn the then-new HTML5
          canvas element. Features a 32×24 block map, coin collection, and
          physics-inspired player movement with configurable speed and rotation —
          all written in vanilla JavaScript and jQuery at a time when canvas
          support was barely in nightlies.
        links:
          - label: Live demo
            url: /canvasGame/
            icon: globe
        tags: [javascript, jquery, canvas, game]

      - title: jTypeWriter
        role: Developer (2006)
        images: []
        description: >
          A jQuery plugin implementing a configurable typewriter animation
          effect. Handles HTML markup and special characters correctly,
          supports letter-by-letter, word-by-word, or phrase-based typing
          modes, and fires an onComplete callback on finishing. Uses jQuery's
          queue system so multiple calls chain naturally. Built as an exercise
          in jQuery plugin architecture.
        links:
          - label: Live demo
            url: /jTypeWriter/
            icon: globe
        tags: [javascript, jquery, animation]
