        tags: [python, atlas, database]

      - title: ATLAS Athena
        role: Contributor
        images: []
        description: >
          Contributions to the ATLAS offline software framework: jet
          substructure calculations, Xbb tagger, jet reclustering, nanobind
          Python bindings for CP tools enabling columnar analysis. Led the
          migration of the entire offline software codebase from SVN to Git.
        links:
          - label: GitLab
            url: https://gitlab.cern.ch/atlas/athena
            icon: gitlab
        tags: [c++, python, atlas]

