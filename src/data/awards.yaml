  - name: Nathan Sugarman Award for Excellence in Graduate Student Research
    date: May 2017
    citation: >
      For his technical contributions and creative insights in the design and
      prototyping of a new high-speed electronics trigger system for
      Lorentz-boosted massive particles for the ATLAS Experiment.
    url: https://efi.uchicago.edu/the-efi/awards/previous-nathan-sugarman-awards/
  - name: US ATLAS Outstanding Graduate Student Award
    date: June 2016
    citation: >
      In recognition of your exceptionally broad and noteworthy contributions
      to the ATLAS experiment. In particular, we recognize your critical
      contributions to the electronics design and prototyping for a new
      high-speed trigger electronics system for the Phase 1 upgrade, software
      development, leadership in the creation of a new method to search for
      Supersymmetry, and software education.
