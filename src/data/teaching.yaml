other_instruction:
  - role: Mentor (WATCHEP Program)
    organization: UC Santa Cruz / WATCHEP
    period: 2025-present
    description: >
      Mentoring three students through the WATCHEP program at UC Santa Cruz,
      providing day-to-day research guidance alongside official lab mentors.
      Justine Partridge (hardware validation of YARR readout system in CI/CD;
      official mentor: Timon Heim, LBNL); Yoshinobu Fujikake (columnar
      analysis framework on Gaudi/Athena; official mentor: Nick Smith, FNAL);
      Qi Bin Lei (HTC benchmark monitoring at BNL analysis facility; official
      mentor: Ofer Rind, BNL).
    url: https://watchep.org/

  - role: Referee
    organization: JHEP & SciPost Physics
    description: >
      Journal referee for 4 JHEP papers and 3 SciPost Physics papers.

  - role: Mentor
    organization: UChicago Bridge Program
    period: 2014-2016
    description: >
      Mentored underrepresented youth from local high school students in the
      Chicago Public system.

  - role: Instructor/Trainer
    organization: American Red Cross
    period: 2004-2012
    description: >
      CPR, First Aid, HIV/AIDS Peer Education instructor and trainer for 8
      years across Palm Beach County (FL) and San Gabriel Pomona Valley (CA)
      chapters. Also trained new instructors for the ARC.
