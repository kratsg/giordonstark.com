  # Standalone educational materials
  - title: "pyhf Tutorial"
    role: Developer & Instructor
    date: 2018-present
    url: https://pyhf.github.io/pyhf-tutorial/
    description: >
      Pedagogical material for statistical inference in particle physics using
      pyhf. Continuously developing new material based on mentor interactions
      with students to bridge gaps in statistical knowledge.

  - title: "GitLab CI/CD for HEP (YouTube, HSF)"
    role: Course Developer
    date: May 2020
    url: https://www.youtube.com/watch?v=NxhDGMo9ILM&list=PLWZ1NKCZTdqcnTEx_CkfTP_3uZWcDOgxY
    description: >
      HEP Software Foundation fully-captioned lesson on CI/CD for physics
      workflows. Inspired the GitHub Actions equivalent course.

  - title: "GitLab CI/CD lesson (HSF/Software Carpentries)"
    role: Course Developer
    date: 2018-present
    url: https://hsf-training.github.io/hsf-training-cicd/
    description: >
      Wrote a brand new lesson on how to use GitLab CI/CD in particle physics.
      Continuously updating based on student feedback. Inspired the equivalent
      GitHub Actions version.

courses_taught:
  - title: "Web Programming (CS 3)"
    role: Student Instructor
    period: 2010-2011
    institution: California Institute of Technology
    description: >
      One of ten student-taught classes ever approved at Caltech. Designed
      syllabus and all training materials. Flipped classroom approach with 1.5h
      hands-on lecture and 1.5h take-home work per week.

  - title: "Computational Physics Lab"
    role: Lab Assistant
    period: Mar-Jun 2011
    institution: California Institute of Technology
    description: >
      Migrated the core software "CurveFit" for the computational physics lab
      from an older version of Mathematica to a newer version.

  - title: "Information Systems and Technology"
    role: Lead Teaching Assistant
    period: Mar 2010-Jun 2011
    institution: California Institute of Technology
    description: >
      Lead TA for Prof. Shuki Bruck for one of Caltech's most renowned elective
      courses. Structured and graded homework assignments for approximately 140
      students.

