speaker_bio: >
  Dr. Giordon Stark is a Deaf project scientist and experimental particle
  physicist working with the ATLAS collaboration at the Santa Cruz Institute
  for Particle Physics, UC Santa Cruz. He earned his PhD in Physics from the
  University of Chicago in 2018 and a B.S. in Physics from Caltech in 2012.
  Giordon's research spans searches for Electroweak Supersymmetry, statistical
  methodology, and analysis infrastructure for the HL-LHC era. He is a core
  developer of pyhf, the tool that enabled the first publication of full
  statistical likelihoods from a particle physics experiment, and he led the
  statistical combination of fourteen electroweak SUSY searches, extending mass
  reach by up to 100 GeV. His current work is split between IRIS-HEP Analysis
  Systems and USATLAS Operations, focusing on columnar workflows, RNTuple
  optimization for ATLAS, and the UChicago Analysis Facility. He previously
  built the QC/QA software used across seven regional clusters to test ~12,000
  pixel modules for the ATLAS Inner Tracker upgrade. He serves on the inaugural
  DPF Coordinating Panel for Software and Computing. When Giordon is not busy
  trying to prove the existence of new physics, he can be found in the kitchen
  proving sourdoughs, baking pavlovas, and anything else he can get his hands
  on.

speaker_intro: >
  My personal opinion when it comes to both seminars and colloquiums is that
  good talks (slides) can be suitable for both kinds of audiences. I am happy
  to talk about any of the work that I do, however the sections below will give
  you some abstracts for presentations that I am already prepared to give on
  shorter notice. If you are considering inviting me for a talk, be aware that
  I will need/be requesting a team of ASL interpreters for any and all
  conversations. Your campus disability services office can likely do that. If
  not, or you are not in the US, there is also probably a way. As outreach is
  an important part of my work, it would be great if you could arrange a
  gathering (dinner at a restaurant, drinks) with the younger folx such as:
  high school, undergraduate, and graduate students. This gathering would also
  need to have ASL interpreters as well. For senior members and other Early
  Career members in your department, I'm happy to have one-on-one sit-downs
  during the day before my talk if you want to schedule that. Finally, I'm
  always down for a baking competition.

abstracts:
  - title: "PARTY CALL PHYSICS: Likelihoods and Classifiers"
    abstract: >
      Communicating results between experimentalists and theorists in particle
      physics has been long and varied. From efficiency maps to selection cut
      flows - the collaboration between the two communities has continued to
      grow and evolve. Now, particularly more than ever, a stronger effort has
      been led within the ATLAS Collaboration taking advantage of the existing
      technologies used, such as containerization and plain-text data formats,
      to make analyses fully reproducible. One such data product from an
      experimental analysis relies on the statistical model used to derive the
      results published in papers, and these statistical models are essential
      information for analysis preservation and reuse. The ATLAS Collaboration
      is starting to publicly provide likelihoods associated with statistical
      fits used in searches for new physics. These likelihoods adhere to a
      specification first defined by the HistFactory p.d.f template
      [CERN-OPEN-2012-016].

      This talk is future-focused and will describe my efforts in improving the
      communication of the field along different avenues. For communicating
      results of experimental particle physics, I will describe how these
      statistical models came about, the technical developments to make this
      possible, and illustrate how detailed information on the statistical
      modeling can enhance the short- and long-term impact of experimental
      results. For communicating physics with for Deaf and Hard-of-Hearing
      members, I will show how I have worked with American Sign Language
      interpreters and linguistic experts developing words and concepts to
      ensure accurate, complete communication. These developed signs can also
      benefit non-signers by changing how particle physicists communicate and
      collaborate in a large international experiment among colleagues of
      diverse backgrounds, cultures, and languages. And finally, for the Early
      Career members of the community, I will describe where we will and can go
      next with the ATLAS detector.
    histfactory_url: https://cds.cern.ch/record/1456844
    footer: This can be given as a colloquium (preferred) or a seminar.

  - title: "Reduce, Reuse, Reinterpret: an end-to-end pipeline for recycling particle physics results"
    abstract: >
      Searches for new physics at the Large Hadron Collider have constrained
      many models of physics beyond the Standard Model. Many searches also
      provide resources that allow them to be reinterpreted in the context of
      other models. We describe a reinterpretation pipeline that examines
      previously untested models of new physics using supplementary information
      from ATLAS Supersymmetry (SUSY) searches in a way that provides accurate
      constraints even for models that differ meaningfully from the benchmark
      models of the original analysis. The public analysis information, such as
      public analysis routines and serialized probability models, is combined
      with common event generation and simulation toolkits MadGraph, Pythia8,
      and Delphes into workflows steered by TOML configuration files, and
      bundled into the mapyde python package. The use of mapyde is demonstrated
      by constraining previously untested SUSY models with compressed sleptons
      and electroweakinos using ATLAS results.
    footer: This can be given either as a short talk or as a tutorial.

  - title: "Not your normal SUSY talk: statistical combinations and reuse of electroweak searches"
    abstract: >
      Searches for new physics at the Large Hadron Collider have constrained
      many models of physics beyond the Standard Model. It has become more
      possible to search for Supersymmetry (SUSY) through electroweak
      interactions, the production of electroweakinos and sleptons, noted for
      their low cross sections. In addition, due to the high dimensionality of
      the phenomenological models, it is difficult to cover the landscape of
      new physics predicted by SUSY. This talk will introduce two different
      ATLAS analyses targeting simplified models and the unique techniques
      developed to explore challenging phase-spaces. After an overview of these
      state-of-the-art results from ATLAS, I will show how we extend existing
      constraints on these simplified models through statistical combinations.
      The results of the combination will remain the strongest limits set on
      electroweak SUSY production for the better part of this decade. Finally,
      this talk will wrap up with a brief overview of a reinterpretation
      pipeline (mapyde) that can be used both as a pedagogical tool as well as
      a tool to explore new models outside of the experimental collaborations.
      Using this tool, I will motivate some potential directions for new physics
      searches.
    footer: This can be given only as a seminar talk.
