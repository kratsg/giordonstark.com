outreach:
  - title: Space Camp Unlimited
    period: "2024"
    url: https://atomichands.com/events/space-camp-unlimited/
    description: >
      Role model for Deaf and Hard-of-Hearing students in collaboration with
      U.S. Space & Rocket Center, NASA, and CSD Learns.

  - title: Conniston Middle School Outreach
    period: Sep 2023
    description: >
      Introduced particle physics to underrepresented minority students.

  - title: Lepton-Photon EDI Panel
    period: Jan 2022
    description: >
      Panel member for equality, diversity, and inclusion at the
      Lepton-Photon conference.

  - title: Accessibility in High Energy Physics (Snowmass 2022)
    period: "2022"
    url: https://arxiv.org/abs/2203.08748
    description: >
      Co-authored the Snowmass 2022 paper documenting lessons on accessibility
      in the HEP community from the Snowmass process.

  - title: ASLCore Physics Lexicon
    period: 2019-2021
    description: >
      Developing ASL signs for physics terminology with RIT linguists, ensuring
      accurate technical communication for Deaf physicists and students.

  - title: Chi Hack Night Volunteering
    period: 2015-2018
    description: >
      Provided technical expertise for activists at Chicago's weekly civic
      technology meetup.

  - title: Federal Lobbying for HEP Funding
    period: "2015"
    description: >
      US LHC Users Association trip to lobby Congress for high energy physics
      funding.

  - title: Chicago Accessible Theater Advocacy
    period: 2013-present
    description: >
      Advocacy for captioning and accessibility in Chicago's theater community.

