    projects:
      - title: Electroweak SUSY Statistical Combination
        role: Lead analyst
        subtitle: SUSY Run-2 Summaries Convener (2020-2022)
        images: []
        description: >
          Led the first large-scale statistical combination of 14 electroweak
          SUSY searches at ATLAS, extending mass exclusion limits by up to
          100 GeV. Appointed first convener of the new "Run 2 Summaries"
          subgroup to coordinate harmonization across analysis teams. As part
          of this work, developed the technical software needed for likelihood
          serialization and inference, open-source particle-level analysis
          framework, and analysis preservation efforts.
        timeline:
          - year: 2018
            label: Joined Combinations Task Force; groundwork for statistical models
          - year: 2020
            label: Appointed first Run-2 Summaries convener
          - year: 2021
            label: "Initial 3L combination published (EPJC)"
            url: https://doi.org/10.1140/epjc/s10052-021-09749-7
          - year: 2023
            label: ATLAS-CONF-2023-046
            url: https://atlas.web.cern.ch/Atlas/GROUPS/PHYSICS/CONFNOTES/ATLAS-CONF-2023-046/
          - year: 2024
            label: "14-analysis statistical combination published (PRL)"
            url: https://link.aps.org/doi/10.1103/PhysRevLett.133.031802
        links:
