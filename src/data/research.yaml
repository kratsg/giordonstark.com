      - title: Agentic Analysis Facility (Elwood)
        role: Principal Investigator / Lead Architect
        subtitle: UChicago Analysis Facility, 2026-present
        images: []
        description: >
          Building an AI-native analysis platform where a physicist describes
          their research intent in natural language and Elwood autonomously
          orchestrates the complete analysis workflow — data discovery via Rucio,
          columnar delivery via ServiceX, histogram production via coffea, and
          statistical inference via pyhf — on a real, operating analysis
          facility. The architecture organizes into three layers: a domain
          "codebook" of structured HEP knowledge articles, MCP tool wrappers
          (for HTCondor, Rucio, ServiceX, coffea, pyhf, Kubernetes, and
          Elasticsearch), and facility configuration files that make the system
          facility-agnostic (UChicago AF, NERSC, future nodes — swap the config,
          the reasoning is indifferent); an agentic harness that selects and
          configures the reasoning loop; and a pluggable reasoning codec.
          The AF Skills Marketplace provides community-contributed domain skills
          for use by agents running on the facility. The system is designed to
          accelerate the full HEP analysis cycle — from petabyte-scale data
          access through statistical inference — across experiment boundaries.
        links:
          - label: AF Skills Marketplace
            url: https://github.com/usatlas/marketplace
            icon: github
          - label: rucio-mcp
            url: https://github.com/kratsg/rucio-mcp
            icon: github
          - label: ami-mcp
            url: https://github.com/kratsg/ami-mcp
            icon: github
