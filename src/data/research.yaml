      - title: gFEX Trigger Electronics
        role: Key contributor & FDR editor
        subtitle: University of Chicago, 2014-2018
        images: []
        description: >
          Critical contributions to design and prototyping of the Global
          Feature Extractor (gFEX), a high-speed trigger electronics system
          for the ATLAS Phase 1 upgrade. Served as editor of the Final Design
          Report. Developed firmware, ML algorithms, and monitoring systems.
          Mentored undergraduates on firmware, ML algorithms, and monitoring.
          Successfully installed and commissioned inside the ATLAS detector in
          October 2021.
        timeline:
