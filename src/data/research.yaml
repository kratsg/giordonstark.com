      - title: LIGO Gravitational Wave Detector
        role: Research Assistant
        subtitle: MIT, Summer 2011
        images: []
        description: >
          Contributed to improving detection resolution of the LIGO
          interferometer at MIT. Diagnosed crosstalk between capacitive
          position sensors (CPS) — used for seismic noise measurement in the
          feedback/feed-forward systems — finding that racks of sensors
          generated mutual interference at 25 kHz, corrupting distance
          measurements. Characterized and implemented a feed-forward seismic
          noise cancellation system using transfer functions, achieving a
          2-orders-of-magnitude noise reduction. Developed watchdog/guardian
          software in Python, Perl, and C to monitor ~32,000 instrument
          variables and manage safe state transitions across the MIT lab.
          Findings published as internal LIGO/VIRGO community documents.
        timeline:
          - year: 2011
            label: "Feed-forward seismic noise cancellation — 100× reduction"
          - year: 2011
            label: Watchdog/guardian system for 32,000+ instrument variables

      - title: Submillimeter Wave Observatory
        role: Research Assistant (Edward C. and Alice Stone Fellow)
        subtitle: Caltech CASIMIR group, 2010
        images: []
        description: >
          Characterized the optical transmittance of materials in the
          submillimeter band (0.1–1.0 mm, 300 GHz–3 THz) for use in sensitive
          submillimeter telescopes and detectors. Built the optical arrangement
          coupling a Fourier Transform Spectrometer to a liquid-helium–cooled
          bolometer (1.4 K), performed cryogenic cooldowns, and conducted
          spectral scans of fourteen material types — including Zitex, Crystal
          Quartz, Sapphire, Mylar, and multi-layer windows. Applied discrete
          Fourier transform analysis to convert interferograms to frequency-domain
          spectra. Results inform component selection for the CASIMIR (Caltech
          Airborne Submillimeter Interstellar Medium Investigations Receiver)
          instrument.
        timeline:
          - year: 2010
            label: "Spring–summer SURF project (14 weeks); bolometer cooldown procedures"
          - year: 2010
            label: Three spectral scans, DFT analysis of interferograms

